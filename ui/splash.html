<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0a0a0a;
  color: #00ff41;
  font-family: 'Courier New', monospace;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}
/* CRT scanlines */
body::before {
  content: '';
  position: fixed;
  top:0;left:0;right:0;bottom:0;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px,
    rgba(0,255,65,0.015) 1px,
    transparent 2px
  );
  pointer-events: none;
  z-index: 100;
}
body::after {
  content: '';
  position: fixed;
  top:0;left:0;right:0;bottom:0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
  pointer-events: none;
  z-index: 99;
}

.boot-container {
  display: flex;
  align-items: flex-start;
  gap: 30px;
}

/* Rex mascot on boot screen */
.boot-rex {
  width: 180px;
  flex-shrink: 0;
  position: relative;
}
.boot-rex img {
  width: 100%;
  filter: drop-shadow(0 0 15px rgba(0,255,65,0.3)) drop-shadow(0 0 40px rgba(0,255,65,0.1));
  animation: rexFloat 3s ease-in-out infinite, rexGlitch 8s ease-in-out infinite;
}
@keyframes rexFloat {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}
@keyframes rexGlitch {
  0%, 100% { filter: drop-shadow(0 0 15px rgba(0,255,65,0.3)) drop-shadow(0 0 40px rgba(0,255,65,0.1)); }
  89% { filter: drop-shadow(0 0 15px rgba(0,255,65,0.3)); }
  90% { filter: drop-shadow(0 0 15px rgba(255,0,64,0.4)) drop-shadow(3px 0 0 rgba(0,255,65,0.3)); transform: translateY(-4px) translateX(2px); }
  91% { filter: drop-shadow(0 0 15px rgba(0,255,65,0.5)) drop-shadow(-2px 0 0 rgba(0,200,255,0.3)); transform: translateY(-6px) translateX(-1px); }
  92% { filter: drop-shadow(0 0 15px rgba(0,255,65,0.3)) drop-shadow(0 0 40px rgba(0,255,65,0.1)); }
}
.boot-rex .rex-label {
  text-align: center;
  font-size: 9px;
  color: #005500;
  margin-top: 8px;
  letter-spacing: 3px;
}
.boot-rex .rex-holo-lines {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 20px;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px,
    rgba(0,255,65,0.04) 2px,
    transparent 4px
  );
  pointer-events: none;
  animation: holoSweep 2s linear infinite;
}
@keyframes holoSweep {
  0%   { background-position: 0 0; }
  100% { background-position: 0 20px; }
}

.boot-right {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.boot-header {
  text-align: center;
  margin-bottom: 30px;
}
.boot-logo {
  font-size: 42px;
  font-weight: bold;
  color: #00ff41;
  text-shadow: 0 0 10px #00ff41, 0 0 30px rgba(0,255,65,0.3);
  letter-spacing: 12px;
  animation: logoFlicker 4s ease-in-out infinite;
}
.boot-sub {
  font-size: 11px;
  color: #00aa2a;
  letter-spacing: 6px;
  margin-top: 8px;
  opacity: 0.8;
}
.boot-classification {
  font-size: 10px;
  color: #ff3333;
  letter-spacing: 4px;
  margin-top: 14px;
  padding: 4px 16px;
  border: 1px solid #ff3333;
  display: inline-block;
  animation: blink 1.2s step-end infinite;
}

@keyframes logoFlicker {
  0%,100% { opacity:1; }
  92% { opacity:1; }
  93% { opacity:0.3; }
  94% { opacity:1; }
  96% { opacity:0.6; }
  97% { opacity:1; }
}
@keyframes blink {
  0%,100% { opacity:1; }
  50% { opacity:0; }
}

.terminal {
  width: 620px;
  background: rgba(0,20,0,0.4);
  border: 1px solid #00ff41;
  border-radius: 2px;
  padding: 20px;
  position: relative;
  box-shadow: 0 0 15px rgba(0,255,65,0.1), inset 0 0 30px rgba(0,0,0,0.5);
}
.terminal-header {
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #004d00;
  padding-bottom: 8px;
  margin-bottom: 12px;
  font-size: 10px;
  color: #007700;
}

#log {
  font-size: 12px;
  line-height: 1.7;
  min-height: 240px;
  max-height: 240px;
  overflow: hidden;
}
#log .line {
  opacity: 0;
  animation: lineIn 0.1s forwards;
  white-space: nowrap;
}
@keyframes lineIn {
  to { opacity: 1; }
}
.line .ok { color: #00ff41; }
.line .warn { color: #ffaa00; }
.line .info { color: #0088ff; }
.line .dim { color: #005500; }
.line .bright { color: #00ff41; text-shadow: 0 0 6px #00ff41; }

.progress-wrap {
  margin-top: 16px;
  border: 1px solid #004d00;
  height: 18px;
  position: relative;
  background: #000;
}
.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #003300, #00ff41);
  box-shadow: 0 0 10px #00ff41;
  transition: width 0.3s ease;
}
.progress-text {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: #00ff41;
  letter-spacing: 2px;
  z-index: 2;
}

.status-row {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
  font-size: 10px;
  color: #005500;
}
</style>
</head>
<body>

<div class="boot-container">
  <div class="boot-rex">
    <img src="static/img/rex-thinking.png" alt="Rex" />
    <div class="rex-holo-lines"></div>
    <div class="rex-label">TRADING ASSISTANT</div>
  </div>

  <div class="boot-right">
    <div class="boot-header">
      <div class="boot-logo">DALIOS</div>
      <div class="boot-sub">AUTOMATED TRADING FRAMEWORK</div>
      <div class="boot-classification">&#9650; TOP SECRET // TRADING SYSTEMS</div>
    </div>

    <div class="terminal">
      <div class="terminal-header">
        <span>DALIOS BOOT SEQUENCE v3.7.1</span>
        <span id="clock">00:00:00</span>
      </div>
      <div id="log"></div>
      <div class="progress-wrap">
        <div class="progress-bar" id="pbar"></div>
        <div class="progress-text" id="ptxt">INITIALISING...</div>
      </div>
      <div class="status-row">
        <span id="sLeft">SUBSYSTEMS: STANDBY</span>
        <span id="sRight">ENCRYPTION: AES-256-GCM</span>
      </div>
    </div>
  </div>
</div>

<script>
const log = document.getElementById('log');
const pbar = document.getElementById('pbar');
const ptxt = document.getElementById('ptxt');
const sLeft = document.getElementById('sLeft');

setInterval(() => {
  const d = new Date();
  document.getElementById('clock').textContent =
    d.toTimeString().split(' ')[0];
}, 1000);

const lines = [
  { t:200,  txt:'> BIOS POST CHECK .......................... <span class="ok">[PASS]</span>' },
  { t:400,  txt:'> MEMORY ALLOCATION 4096MB ................. <span class="ok">[OK]</span>' },
  { t:600,  txt:'> SECURE BOOT VERIFICATION ................. <span class="ok">[VERIFIED]</span>' },
  { t:900,  txt:'> LOADING KERNEL MODULES ................... <span class="ok">[OK]</span>' },
  { t:1100, txt:'<span class="dim">  &#9500;&#9472;&#9472; crypto.aes256 ..................... loaded</span>' },
  { t:1250, txt:'<span class="dim">  &#9500;&#9472;&#9472; net.tls1.3 ....................... loaded</span>' },
  { t:1400, txt:'<span class="dim">  &#9492;&#9472;&#9472; sys.watchdog ..................... loaded</span>' },
  { t:1700, txt:'> INITIALISING TRADING ENGINE .............. <span class="info">[INIT]</span>' },
  { t:2000, txt:'> MOUNTING ENCRYPTED FILESYSTEM ............ <span class="ok">[MOUNTED]</span>' },
  { t:2300, txt:'> LOADING MARKET DATA FEEDS ................ <span class="ok">[CONNECTED]</span>' },
  { t:2600, txt:'> PORTFOLIO ENGINE BOOTSTRAP ............... <span class="ok">[READY]</span>' },
  { t:2900, txt:'> RISK MANAGEMENT MODULE ................... <span class="ok">[ARMED]</span>' },
  { t:3200, txt:'> SIGNAL PROCESSING PIPELINE ............... <span class="ok">[ONLINE]</span>' },
  { t:3500, txt:'> BROKER API HANDSHAKE ..................... <span class="warn">[STANDBY]</span>' },
  { t:3800, txt:'> AUTONOMOUS AGENT CORE ................... <span class="ok">[LOADED]</span>' },
  { t:4100, txt:'> SCANNING ASX UNIVERSE (2,200+ TICKERS) .. <span class="info">[CACHED]</span>' },
  { t:4400, txt:'> SENTIMENT ANALYSIS ENGINE ................ <span class="ok">[READY]</span>' },
  { t:4700, txt:'> WEBSOCKET CHANNELS ...................... <span class="ok">[OPEN]</span>' },
  { t:5000, txt:'> COMMAND & CONTROL INTERFACE .............. <span class="ok">[ONLINE]</span>' },
  { t:5300, txt:'> STOP-LOSS / TAKE-PROFIT MONITOR ......... <span class="ok">[ARMED]</span>' },
  { t:5600, txt:'> FIREWALL RULES .......................... <span class="ok">[ENFORCED]</span>' },
  { t:5900, txt:'> SYSTEM INTEGRITY CHECK .................. <span class="ok">[PASS]</span>' },
  { t:6200, txt:'<span class="bright">> ALL SUBSYSTEMS OPERATIONAL</span>' },
  { t:6500, txt:'<span class="bright">> LAUNCHING DALIOS INTERFACE...</span>' },
];

const totalLines = lines.length;
lines.forEach((l, i) => {
  setTimeout(() => {
    const div = document.createElement('div');
    div.className = 'line';
    div.innerHTML = l.txt;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    const pct = Math.round(((i+1) / totalLines) * 100);
    pbar.style.width = pct + '%';
    ptxt.textContent = pct + '%';
    if (pct > 50) sLeft.textContent = 'SUBSYSTEMS: LOADING';
    if (pct > 90) sLeft.textContent = 'SUBSYSTEMS: ONLINE';
  }, l.t);
});

setTimeout(() => {
  ptxt.textContent = 'SYSTEM READY';
  ptxt.style.textShadow = '0 0 8px #00ff41';
  if (window.pywebview) {
    window.pywebview.api.boot_complete();
  }
}, 7000);
</script>
</body>
</html>
